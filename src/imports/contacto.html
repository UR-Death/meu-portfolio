<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Ricardo Sousa</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/reminder.css">
    <link rel="stylesheet" href="CSS/header-fixes.css">
    <style>
        .notification{padding:12px;margin-top:12px;border-radius:4px;display:none}
        .notification.success{background:#e6ffed;border:1px solid #2ecc71;color:#166534}
        .notification.error{background:#ffecec;border:1px solid #e74c3c;color:#611a15}
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <div class="logo-name">RICARDO SOUSA</div>
            <p class="logo-sub">Modelador 3D/Desenvolvedor de Jogos</p>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="section">
            <div class="contact-form-container">
                <h2 class="section-title">Contacto</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" placeholder="Escreva aqui" required>
                    </div>
                    <div class="form-group">
                        <label for="sobrenome">Sobrenome</label>
                        <input type="text" id="sobrenome" name="sobrenome" placeholder="Escreva aqui" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Escreva aqui" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Escreva aqui" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Enviar</button>
                </form>
                <div id="notice" class="notification"></div>
                
                <!-- EmailJS: envia diretamente para o seu Gmail -->
                <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
                <script>
                    (function(){
                        // Suas credenciais EmailJS
                        const EMAILJS_USER_ID = 'woWIbsi8TuNIrWuqY';
                        const EMAILJS_SERVICE_ID = 'service_0zgoatz0';
                        const EMAILJS_TEMPLATE_ID = 'template_62kpd0f';
                        
                        // Inicializar EmailJS
                        emailjs.init(EMAILJS_USER_ID);

                        const form = document.getElementById('contact-form');
                        const notice = document.getElementById('notice');
                        
                        function show(msg, ok=true){
                            notice.textContent = msg;
                            notice.className = 'notification ' + (ok ? 'success' : 'error');
                            notice.style.display = 'block';
                            setTimeout(()=> notice.style.display = 'none', 7000);
                        }

                        form.addEventListener('submit', function(e){
                            e.preventDefault();
                            
                            const templateParams = {
                                from_name: (document.getElementById('nome').value || '') + ' ' + (document.getElementById('sobrenome').value || ''),
                                from_email: document.getElementById('email').value,
                                message: document.getElementById('message').value,
                                to_email: 'ricardosousa2047@gmail.com'
                            };
                            
                            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
                                .then(function(){
                                    show('Mensagem enviada com sucesso. Obrigado!', true);
                                    form.reset();
                                }, function(error){
                                    show('Erro ao enviar: ' + (error && error.text ? error.text : 'Tente novamente'), false);
                                    console.error('Erro EmailJS:', error);
                                });
                        });
                    })();
                </script>
                
                <div class="social-icons">
                    <a href="https://www.linkedin.com/feed/" target="_blank"><img src="images/linkedin-icon.png" alt="LinkedIn"></a>
                    <a href="#" target="_blank"><img src="images/web-icon.png" alt="Website"></a>
                    <a href="https://www.facebook.com/?locale=pt_PT" target="_blank"><img src="images/facebook-icon.png" alt="Facebook"></a>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>© 2025 Ricardo Sousa</p>
    </footer>

</body>
</html>
